[package]
name = "htmx-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = { version = "0.2", features = ["serde-serialize"] }
console_error_panic_hook = "0.1"
web-sys = { version = "0.3", features = [
  "console", "Document", "Element", "Event", "EventTarget", "HtmlElement",
  "WebSocket", "EventSource", "MessageEvent", "CloseEvent", "ErrorEvent",
  "CustomEvent", "CustomEventInit", "XmlHttpRequest", "FormData", "Url", "UrlSearchParams",
  "DocumentFragment", "Node", "Window", "History", "Location", "NodeList"
]}
js-sys = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.4"
wasm-bindgen-futures = "0.4"

[features]
default = ["websocket", "sse"]
websocket = []
sse = []
all-extensions = ["websocket", "sse"]

[dev-dependencies]
wasm-bindgen-test = "0.3"
