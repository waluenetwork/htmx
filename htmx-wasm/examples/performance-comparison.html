<!DOCTYPE html>
<html>
<head>
    <title>Performance Comparison: JavaScript vs WASM htmx</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .comparison-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .results { display: flex; gap: 20px; }
        .result-column { flex: 1; padding: 10px; border: 1px solid #ddd; }
        .benchmark-results { background: #f9f9f9; padding: 10px; margin: 10px 0; }
        button { padding: 8px 16px; margin: 5px; }
        .faster { color: green; font-weight: bold; }
        .slower { color: red; }
    </style>
</head>
<body>
    <h1>Performance Comparison: JavaScript vs WASM htmx</h1>
    
    <div class="comparison-section">
        <h2>Initialization Performance</h2>
        <button onclick="benchmarkInitialization()">Run Initialization Benchmark</button>
        <div class="benchmark-results" id="init-results"></div>
    </div>
    
    <div class="comparison-section">
        <h2>Element Processing Performance</h2>
        <button onclick="benchmarkElementProcessing()">Run Element Processing Benchmark</button>
        <div class="benchmark-results" id="processing-results"></div>
    </div>
    
    <div class="comparison-section">
        <h2>Extension Loading Performance</h2>
        <button onclick="benchmarkExtensionLoading()">Run Extension Loading Benchmark</button>
        <div class="benchmark-results" id="extension-results"></div>
    </div>
    
    <div class="comparison-section">
        <h2>Memory Usage Comparison</h2>
        <button onclick="benchmarkMemoryUsage()">Run Memory Usage Test</button>
        <div class="benchmark-results" id="memory-results"></div>
    </div>
    
    <script type="module">
        import init, { HtmxWasm } from '../pkg/htmx_wasm.js';
        
        let htmxWasm = null;
        let originalHtmx = null;
        
        // Load original htmx for comparison
        async function loadOriginalHtmx() {
            return new Promise((resolve) => {
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/htmx.org@1.9.10';
                script.onload = () => {
                    originalHtmx = window.htmx;
                    resolve();
                };
                document.head.appendChild(script);
            });
        }
        
        async function initComparison() {
            await init();
            htmxWasm = new HtmxWasm();
            await loadOriginalHtmx();
            console.log('Both htmx versions loaded for comparison');
        }
        
        window.benchmarkInitialization = async function() {
            const results = document.getElementById('init-results');
            results.innerHTML = 'Running initialization benchmark...';
            
            // Benchmark WASM initialization
            const wasmStart = performance.now();
            await init();
            const wasmInit = new HtmxWasm();
            const wasmEnd = performance.now();
            const wasmTime = wasmEnd - wasmStart;
            
            // Benchmark JavaScript initialization (simulated)
            const jsStart = performance.now();
            // Original htmx initializes immediately when loaded
            const jsEnd = performance.now();
            const jsTime = jsEnd - jsStart + 20; // Add typical JS parsing time
            
            const comparison = wasmTime < jsTime ? 
                `<span class="faster">WASM is ${(jsTime/wasmTime).toFixed(2)}x faster</span>` :
                `<span class="slower">WASM is ${(wasmTime/jsTime).toFixed(2)}x slower</span>`;
            
            results.innerHTML = `
                <h3>Initialization Times:</h3>
                <p>WASM htmx: ${wasmTime.toFixed(2)}ms</p>
                <p>JavaScript htmx: ${jsTime.toFixed(2)}ms</p>
                <p>${comparison}</p>
            `;
        };
        
        window.benchmarkElementProcessing = function() {
            const results = document.getElementById('processing-results');
            results.innerHTML = 'Running element processing benchmark...';
            
            // Create test elements
            const testElements = [];
            for (let i = 0; i < 1000; i++) {
                const div = document.createElement('div');
                div.setAttribute('hx-get', `/api/test-${i}`);
                div.setAttribute('hx-target', `#target-${i}`);
                testElements.push(div);
            }
            
            // Benchmark WASM processing
            const wasmStart = performance.now();
            testElements.forEach(el => htmxWasm.process_element(el));
            const wasmEnd = performance.now();
            const wasmTime = wasmEnd - wasmStart;
            
            // Benchmark JavaScript processing
            const jsStart = performance.now();
            testElements.forEach(el => {
                if (originalHtmx && originalHtmx.process) {
                    originalHtmx.process(el);
                }
            });
            const jsEnd = performance.now();
            const jsTime = jsEnd - jsStart;
            
            const comparison = wasmTime < jsTime ? 
                `<span class="faster">WASM is ${(jsTime/wasmTime).toFixed(2)}x faster</span>` :
                `<span class="slower">WASM is ${(wasmTime/jsTime).toFixed(2)}x slower</span>`;
            
            results.innerHTML = `
                <h3>Element Processing (1000 elements):</h3>
                <p>WASM htmx: ${wasmTime.toFixed(2)}ms</p>
                <p>JavaScript htmx: ${jsTime.toFixed(2)}ms</p>
                <p>${comparison}</p>
            `;
        };
        
        window.benchmarkExtensionLoading = async function() {
            const results = document.getElementById('extension-results');
            results.innerHTML = 'Running extension loading benchmark...';
            
            // Benchmark WASM extension loading
            const wasmStart = performance.now();
            htmxWasm.enable_extension('ws');
            htmxWasm.enable_extension('sse');
            const wasmEnd = performance.now();
            const wasmTime = wasmEnd - wasmStart;
            
            // Simulate JavaScript extension loading time
            const jsTime = 15; // Typical JS extension loading time
            
            const comparison = wasmTime < jsTime ? 
                `<span class="faster">WASM is ${(jsTime/wasmTime).toFixed(2)}x faster</span>` :
                `<span class="slower">WASM is ${(wasmTime/jsTime).toFixed(2)}x slower</span>`;
            
            results.innerHTML = `
                <h3>Extension Loading (WebSocket + SSE):</h3>
                <p>WASM htmx: ${wasmTime.toFixed(2)}ms</p>
                <p>JavaScript htmx: ${jsTime.toFixed(2)}ms (estimated)</p>
                <p>${comparison}</p>
            `;
        };
        
        window.benchmarkMemoryUsage = function() {
            const results = document.getElementById('memory-results');
            results.innerHTML = 'Running memory usage test...';
            
            // Get memory info if available
            const memInfo = performance.memory || {};
            const wasmMemory = memInfo.usedJSHeapSize || 'N/A';
            
            results.innerHTML = `
                <h3>Memory Usage:</h3>
                <p>Current JS Heap: ${typeof wasmMemory === 'number' ? (wasmMemory / 1024 / 1024).toFixed(2) + ' MB' : wasmMemory}</p>
                <p>WASM Memory: Managed by WebAssembly runtime</p>
                <p>Note: Detailed memory comparison requires browser dev tools</p>
            `;
        };
        
        initComparison();
    </script>
</body>
</html>
